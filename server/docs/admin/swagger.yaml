basePath: /api/v1
definitions:
  ErrorResponse:
    properties:
      code:
        example: Bad Request
        type: string
      message:
        example: invalid request
        type: string
    type: object
  GoogleSignInRequest:
    properties:
      id_token:
        type: string
    required:
    - id_token
    type: object
  GoogleSignInResponse:
    properties:
      email:
        type: string
      name:
        type: string
      pictureUrl:
        type: string
      status:
        type: string
    type: object
  ListUsersResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/User'
        type: array
    type: object
  MeResponse:
    properties:
      approvedAt:
        type: string
      approvedBy:
        type: string
      createdAt:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      pictureUrl:
        type: string
      status:
        type: string
      updatedAt:
        type: string
    type: object
  User:
    properties:
      alias:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
info:
  contact: {}
  description: Admin REST API for the internal management console.
  title: Re:Earth Accounts Admin API
  version: "1.0"
paths:
  /auth/google:
    post:
      consumes:
      - application/json
      description: Google の id_token を検証し、管理者セッション Cookie を発行する。新規アカウントは pending（bootstrap
        対象なら approved）。
      parameters:
      - description: Google id_token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/GoogleSignInRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/GoogleSignInResponse'
        "400":
          description: リクエスト不正
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: id_token 検証失敗
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: ドメイン不許可 / 未検証メール
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Google id_token でサインイン
      tags:
      - auth
  /auth/logout:
    post:
      description: セッション Cookie を破棄する。公開エンドポイント（期限切れ/無効なトークンでも Cookie を消去できるようにするため）。
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      summary: ログアウト
      tags:
      - auth
  /me:
    get:
      description: セッション Cookie に対応する管理者ユーザーのレコードを返す（status を問わない）。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/MeResponse'
        "401":
          description: 未認証
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: アカウントが存在しない
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - AdminSession: []
      summary: 現在の管理者ユーザーを取得
      tags:
      - auth
  /users:
    get:
      consumes:
      - application/json
      description: 全ユーザーを取得する（管理者権限が必要）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ListUsersResponse'
        "401":
          description: 認証エラー
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: 権限エラー
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: サーバーエラー
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: ユーザー一覧を取得
      tags:
      - users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
