basePath: /api/v1
definitions:
  AdminUser:
    properties:
      approvedAt:
        type: string
      approvedBy:
        type: string
      createdAt:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      pictureUrl:
        type: string
      role:
        type: string
      status:
        type: string
      updatedAt:
        type: string
    type: object
  ErrorResponse:
    properties:
      code:
        example: Bad Request
        type: string
      message:
        example: invalid request
        type: string
    type: object
  GoogleSignInRequest:
    properties:
      id_token:
        type: string
    required:
    - id_token
    type: object
  GoogleSignInResponse:
    properties:
      email:
        type: string
      name:
        type: string
      pictureUrl:
        type: string
      status:
        type: string
    type: object
  ListAdminUsersResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/AdminUser'
        type: array
      page:
        type: integer
      perPage:
        type: integer
      totalCount:
        type: integer
    type: object
  ListUsersResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/User'
        type: array
      page:
        type: integer
      perPage:
        type: integer
      totalCount:
        type: integer
    type: object
  ListWorkspacesResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/Workspace'
        type: array
      page:
        type: integer
      perPage:
        type: integer
      totalCount:
        type: integer
    type: object
  MeResponse:
    properties:
      approvedAt:
        type: string
      approvedBy:
        type: string
      createdAt:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      pictureUrl:
        type: string
      status:
        type: string
      updatedAt:
        type: string
    type: object
  SetAdminUserRoleRequest:
    properties:
      role:
        type: string
    required:
    - role
    type: object
  User:
    properties:
      alias:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  UserDetail:
    properties:
      alias:
        type: string
      email:
        type: string
      host:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  UserWorkspace:
    properties:
      alias:
        type: string
      id:
        type: string
      name:
        type: string
      personal:
        type: boolean
      role:
        type: string
    type: object
  Workspace:
    properties:
      alias:
        type: string
      id:
        type: string
      memberCount:
        type: integer
      name:
        type: string
      personal:
        type: boolean
      updatedAt:
        type: string
    type: object
  WorkspaceMember:
    properties:
      disabled:
        type: boolean
      email:
        description: empty string if the member's user cannot be resolved
        type: string
      name:
        description: empty string if the member's user cannot be resolved
        type: string
      role:
        type: string
      userId:
        type: string
    type: object
info:
  contact: {}
  description: Admin REST API for the internal management console.
  title: Re:Earth Accounts Admin API
  version: "1.0"
paths:
  /admin-users:
    get:
      description: Lists admin users in creation order, optionally filtered by status
        and/or role, with offset pagination.
      parameters:
      - description: Filter by status
        enum:
        - pending
        - approved
        - rejected
        in: query
        name: status
        type: string
      - description: Filter by role
        enum:
        - system_admin
        - viewer
        in: query
        name: role
        type: string
      - description: Page number (1-based)
        in: query
        name: page
        type: integer
      - description: Items per page (max 100)
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ListAdminUsersResponse'
        "400":
          description: invalid query
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: not approved
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: List admin users
      tags:
      - admin-users
  /admin-users/{id}/approve:
    post:
      description: Approves a pending or rejected admin user, recording the current
        admin as approver. Idempotent for already-approved users (the original approver/timestamp
        is kept). Cannot approve your own account.
      parameters:
      - description: Admin user ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/AdminUser'
        "400":
          description: invalid id / cannot modify self
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: not approved
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: not found
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Approve an admin user
      tags:
      - admin-users
  /admin-users/{id}/reject:
    post:
      description: Rejects a pending admin user or revokes an approved one. Cannot
        reject your own account, and the last approved admin cannot be rejected.
      parameters:
      - description: Admin user ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/AdminUser'
        "400":
          description: invalid id / cannot modify self / last approved admin
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: not approved
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: not found
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Reject or revoke an admin user
      tags:
      - admin-users
  /admin-users/{id}/roles:
    put:
      consumes:
      - application/json
      description: Assigns a role (e.g. system_admin, viewer) to the target admin
        user. Changing your own role is allowed, but the last system_admin cannot
        be demoted (the system must never reach zero system_admins).
      parameters:
      - description: Admin user ID
        in: path
        name: id
        required: true
        type: string
      - description: Role to assign
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/SetAdminUserRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/AdminUser'
        "400":
          description: invalid id / invalid role / cannot demote the last system admin
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: not approved / forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: not found
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Assign a role to an admin user
      tags:
      - admin-users
  /auth/google:
    post:
      consumes:
      - application/json
      description: Verifies the Google id_token and issues an admin session cookie.
        New accounts are created as pending (approved when the email is bootstrapped).
      parameters:
      - description: Google id_token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/GoogleSignInRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/GoogleSignInResponse'
        "400":
          description: invalid request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: id_token verification failed
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: domain not allowed / email not verified
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Sign in with a Google id_token
      tags:
      - auth
  /auth/logout:
    post:
      description: Clears the session cookie. Public endpoint so the cookie can be
        cleared even with an expired/invalid token.
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      summary: Log out
      tags:
      - auth
  /me:
    get:
      description: Returns the admin user record for the session cookie (any status).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/MeResponse'
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: account not found
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Get the current admin user
      tags:
      - auth
  /users:
    get:
      description: Lists users, optionally filtered by a name/alias/email keyword,
        with offset pagination.
      parameters:
      - description: Search by name, alias or email
        in: query
        name: q
        type: string
      - description: Page number (1-based)
        in: query
        name: page
        type: integer
      - description: Items per page (max 100)
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ListUsersResponse'
        "400":
          description: invalid query
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: not approved
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: List users
      tags:
      - users
  /users/{id}:
    get:
      description: Returns the detail of a single user by ID.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/UserDetail'
        "400":
          description: invalid id
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: not approved
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: not found
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Get a user
      tags:
      - users
  /users/{id}/workspaces:
    get:
      description: Returns the workspaces the user belongs to, with the user's role
        in each. An existing user in no workspace returns an empty list; a non-existent
        user returns 404.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/UserWorkspace'
            type: array
        "400":
          description: invalid id
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: not approved
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: user not found
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: List a user's workspaces
      tags:
      - users
  /workspaces:
    get:
      description: |-
        Lists workspaces across all tenants, optionally filtered by a name/alias keyword, with offset pagination.
        When one or more `ids` query parameters are supplied, the endpoint instead resolves those workspaces by ID (existing ones only; unknown IDs are omitted) and ignores `q`, `page` and `per_page`. At most 100 ids may be supplied per request.
      parameters:
      - collectionFormat: multi
        description: Batch fetch by workspace ID (repeatable, max 100). When present,
          q/page/per_page are ignored.
        in: query
        items:
          type: string
        name: ids
        type: array
      - description: Search by name or alias
        in: query
        name: q
        type: string
      - description: Page number (1-based)
        in: query
        name: page
        type: integer
      - description: Items per page (max 100)
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ListWorkspacesResponse'
        "400":
          description: invalid query
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: not approved
          schema:
            $ref: '#/definitions/ErrorResponse'
        "501":
          description: not implemented on this backend
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: List workspaces
      tags:
      - workspaces
  /workspaces/{id}:
    get:
      description: Returns the detail of a single workspace by ID.
      parameters:
      - description: Workspace ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/Workspace'
        "400":
          description: invalid id
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: not approved
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: not found
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Get a workspace
      tags:
      - workspaces
  /workspaces/{id}/members:
    get:
      description: Returns the members of a workspace, each with their role and (when
        resolvable) the underlying user's name and email.
      parameters:
      - description: Workspace ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/WorkspaceMember'
            type: array
        "400":
          description: invalid id
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: not approved
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: not found
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: List a workspace's members
      tags:
      - workspaces
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
