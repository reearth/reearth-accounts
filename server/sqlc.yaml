version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/infrastructure/postgres/sqlc/schema/schema.sql"
    queries: "internal/infrastructure/postgres/sqlc/queries"
    gen:
      go:
        package: "gen"
        out: "internal/infrastructure/postgres/sqlc/gen"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: false
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
