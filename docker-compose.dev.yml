services:
  reearth-cerbos:
    image: cerbos/cerbos:0.40.0
    command: server --config=/policies/.cerbos.yaml
    ports:
      - 3593:3593
    volumes:
      - ./server/e2e/testdata/policies:/policies
    networks:
      - reearth

  # Optional PostgreSQL backend (opt-in). Point the app at it with
  # REEARTH_ACCOUNTS_DB=postgres://reearth:reearth@postgres:5432/reearth-account?sslmode=disable
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reearth
      POSTGRES_PASSWORD: reearth
      POSTGRES_DB: reearth-account
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - reearth

  reearth-accounts-dev:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    env_file:
      - ./server/.env.docker
    ports:
      - 8090:8090
    depends_on:
      - reearth-cerbos
    volumes:
      - ./server:/reearth-accounts  # Mount source code for hot reload
      - /reearth-accounts/tmp       # Exclude tmp directory
    networks:
      - reearth

volumes:
  postgres-data:

networks:
  reearth:
    external: true
